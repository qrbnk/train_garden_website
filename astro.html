<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Train Garden | Career Astrology Engine</title>
    
    <script src="cities.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "sage": "#4a675d", "gold": "#b59410", "cream": "#fdfdfb", "mist": "#f4f7f5" },
                    fontFamily: { "headline": ["Noto Serif"], "body": ["Manrope"] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #fdfdfb; color: #2d3632; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(74, 103, 93, 0.1); }
        input { border-bottom: 1px solid #d1d9d4 !important; border-radius: 0 !important; background: transparent !important; transition: all 0.3s; }
        input:focus { border-color: #4a675d !important; outline: none !important; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Hide the technical fields unless specifically needed */
        .tech-hide { display: none; }
    </style>
</head>
<body class="font-body selection:bg-sage/10">

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-12">
            <h1 class="font-headline text-5xl text-sage mb-2">Train Garden</h1>
            <p class="text-[10px] tracking-[0.4em] uppercase text-slate-400 font-bold">Astrological Career Intelligence</p>
        </header>

        <section id="input-view" class="max-w-2xl mx-auto glass-panel p-10 rounded-[2.5rem] shadow-2xl shadow-sage/5">
            <form id="astroForm" class="space-y-10" novalidate>
                <div class="space-y-8">
                    <div id="search-container">
                        <label class="text-[10px] uppercase tracking-widest text-sage font-bold mb-2 block">Birth Location</label>
                        <input required list="universal-cities" id="cityInput" autocomplete="off" placeholder="Type city (e.g. Zhytomyr)" class="w-full py-3 text-lg italic font-headline">
                        <datalist id="universal-cities"></datalist>
                    </div>

                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-sage font-bold mb-2 block">Birth Date</label>
                            <input required type="date" id="birthDate" class="w-full py-3">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-sage font-bold mb-2 block">Birth Time</label>
                            <input required type="time" id="birthTime" class="w-full py-3">
                        </div>
                    </div>

                    <div id="manual-entry" class="pt-6 border-t border-sage/5">
                        <div class="flex gap-4">
                            <input type="hidden" id="lat">
                            <input type="hidden" id="lon">
                            <input type="hidden" id="tz">
                        </div>
                        <p id="coord-status" class="text-[10px] text-slate-400 italic">Please select a city to lock coordinates.</p>
                    </div>   
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-sage text-white py-5 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-sage/90 transition-all shadow-lg shadow-sage/20">
                    Find My Career Path
                </button>
            </form>
        </section>

        <section id="results-view" class="hidden space-y-10 py-10 fade-in">
            <div class="text-center mb-8">
                <span id="res-city" class="text-[10px] tracking-[0.5em] uppercase text-gold font-bold"></span>
                <h2 id="res-archetype" class="font-headline text-5xl text-sage italic mt-4"></h2>
                <p id="career-sector" class="text-sage/60 font-medium tracking-wide mt-2"></p>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-white p-10 rounded-[2.5rem] border border-sage/5 shadow-sm">
                    <h3 class="text-[10px] uppercase tracking-widest text-sage font-bold mb-4">Midheaven (Career Point)</h3>
                    <p id="mc-val" class="font-headline text-4xl text-sage"></p>
                </div>
                <div class="bg-white p-10 rounded-[2.5rem] border border-sage/5 shadow-sm">
                    <h3 class="text-[10px] uppercase tracking-widest text-sage font-bold mb-4">Ascendant (Rising)</h3>
                    <p id="asc-val" class="font-headline text-4xl text-sage"></p>
                </div>
            </div>

            <div id="career-recommendations" class="bg-sage text-white p-12 rounded-[3rem] shadow-xl">
                <h3 class="text-[10px] uppercase tracking-[0.3em] font-bold mb-6 opacity-70">Recommended Roles</h3>
                <div id="role-list" class="grid grid-cols-1 md:grid-cols-3 gap-6 font-headline text-xl italic"></div>
            </div>

            <div class="text-center">
                <button onclick="location.reload()" class="text-gold font-bold uppercase text-[10px] tracking-widest border-b border-gold/20 pb-1">Reset Search</button>
            </div>
        </section>
    </main>

<script>
    const CAREER_MAP = {
        "Aries": { sector: "Entrepreneurship & Defense", roles: ["Startup Founder", "Strategic Leader", "Crisis Manager"], archetype: "The Trailblazer" },
        "Taurus": { sector: "Finance & Real Estate", roles: ["Asset Manager", "Interior Architect", "Valuation Expert"], archetype: "The Builder" },
        "Gemini": { sector: "Communications & Tech", roles: ["Software Developer", "Digital Strategist", "Technical Writer"], archetype: "The Messenger" },
        "Cancer": { sector: "Care & Hospitality", roles: ["HR Director", "Clinical Psychologist", "Executive Chef"], archetype: "The Nurturer" },
        "Leo": { sector: "Entertainment & Leadership", roles: ["Creative Director", "Public Speaker", "Brand Ambassador"], archetype: "The Performer" },
        "Virgo": { sector: "Data & Systems", roles: ["Data Scientist", "Quality Auditor", "Medical Researcher"], archetype: "The Analyst" },
        "Libra": { sector: "Law & Design", roles: ["Corporate Attorney", "Product Designer", "Diplomat"], archetype: "The Mediator" },
        "Scorpio": { sector: "Investigation & Deep Tech", roles: ["Cybersecurity Expert", "Investigative Journalist", "Surgeon"], archetype: "The Strategist" },
        "Sagittarius": { sector: "Education & Global Trade", roles: ["Global Consultant", "Professor", "International Lawyer"], archetype: "The Explorer" },
        "Capricorn": { sector: "Structure & Engineering", roles: ["Civil Engineer", "Operations Manager", "Financial Controller"], archetype: "The Executive" },
        "Aquarius": { sector: "Innovation & Social Impact", roles: ["AI Researcher", "Community Architect", "Social Entrepreneur"], archetype: "The Visionary" },
        "Pisces": { sector: "Arts & Healing", roles: ["Visual Artist", "Holistic Therapist", "Music Producer"], archetype: "The Dreamer" }
    };

    const SIGNS = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
    const RAD = Math.PI / 180;
    const DEG = 180 / Math.PI;

    let fuse;

    window.onload = () => {
        if (typeof ALL_CITIES !== 'undefined') {
            fuse = new Fuse(ALL_CITIES, { keys: ['name', 'ascii_name'], threshold: 0.3, limit: 15 });
        }
    };

    function performLookup(val) {
        if (!val || !window.ALL_CITIES) return;
        const query = val.trim().toLowerCase();
        const match = ALL_CITIES.find(c => c.name.toLowerCase() === query || (c.ascii_name && c.ascii_name.toLowerCase() === query));
        
        if (match) {
            document.getElementById('lat').value = match.lat || match.latitude;
            document.getElementById('lon').value = match.lon || match.longitude;
            document.getElementById('tz').value = match.tz || match.timezone || 0;
            document.getElementById('coord-status').innerText = `Coordinates Locked: ${match.lat}, ${match.lon}`;
            document.getElementById('coord-status').classList.replace('text-slate-400', 'text-sage');
        }
    }

    // Capture every typing event and selection event
    document.getElementById('cityInput').addEventListener('input', (e) => {
        const val = e.target.value;
        performLookup(val);
        
        if (fuse && val.length > 1) {
            const results = fuse.search(val);
            const list = document.getElementById('universal-cities');
            list.innerHTML = '';
            results.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.item.name;
                list.appendChild(opt);
            });
        }
    });

    document.getElementById('astroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const cityName = document.getElementById('cityInput').value;
        const date = document.getElementById('birthDate').value;
        const time = document.getElementById('birthTime').value;

        // One last lookup to be absolutely sure
        performLookup(cityName);

        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);
        const tz = parseFloat(document.getElementById('tz').value);

        if (isNaN(lat) || isNaN(lon)) {
            alert("Please pick a city from the list so we can find your coordinates.");
            return;
        }

        if (!date || !time) {
            alert("Please provide birth date and time.");
            return;
        }

        calculateCareerEngine(date, time, lat, lon, isNaN(tz) ? 0 : tz, cityName);
    });

    function calculateCareerEngine(dateStr, timeStr, lat, lon, tz, cityName) {
        try {
            const [y, m, d] = dateStr.split('-').map(Number);
            const [h, min] = timeStr.split(':').map(Number);

            let UT = h + (min / 60) - tz;
            let year = y, month = m;
            if (month <= 2) { year -= 1; month += 12; }
            const A = Math.floor(year / 100);
            const B = 2 - A + Math.floor(A / 4);
            const JD = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + d + (UT / 24) + B - 1524.5;
            
            const T = (JD - 2451545.0) / 36525;
            let gst = 280.46061837 + 360.98564736629 * (JD - 2451545.0) + 0.000387933 * T * T - (T * T * T / 38710000);
            gst = (gst % 360 + 360) % 360;

            const RAMC = (gst + lon + 360) % 360;
            const ramcRad = RAMC * RAD;
            const latRad = lat * RAD;
            const eps = (23.43929111 - (46.8150 * T) / 3600) * RAD;

            let mc = (Math.atan2(Math.sin(ramcRad), Math.cos(ramcRad) * Math.cos(eps)) * DEG + 360) % 360;
            let asc = (Math.atan2(Math.cos(ramcRad), -(Math.sin(ramcRad) * Math.cos(eps) + Math.tan(latRad) * Math.sin(eps))) * DEG + 360) % 360;

            const mcSign = SIGNS[Math.floor(mc / 30)];
            const ascSign = SIGNS[Math.floor(asc / 30)];
            const careerData = CAREER_MAP[mcSign];

            document.getElementById('res-city').innerText = cityName;
            document.getElementById('res-archetype').innerText = careerData.archetype;
            document.getElementById('career-sector').innerText = `Primary Sector: ${careerData.sector}`;
            document.getElementById('mc-val').innerText = `${Math.floor(mc % 30)}° ${mcSign}`;
            document.getElementById('asc-val').innerText = `${Math.floor(asc % 30)}° ${ascSign}`;
            
            const roleList = document.getElementById('role-list');
            roleList.innerHTML = careerData.roles.map(role => `<div>${role}</div>`).join('');
            
            document.getElementById('input-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');

        } catch(e) {
            console.error(e);
        }
    }
</script>
</body>
</html>
